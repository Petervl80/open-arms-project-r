services:
  db:
    container_name: db
    image: mysql:9.1.0
    restart: always
    environment:
      TZ: America/Recife
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_USER: docker
      MYSQL_PASSWORD: admin123
      MYSQL_DATABASE: open_arms_db
    ports:
      - "3308:3306"
    expose:
      - 3308
    networks:
      - open-arms-network

networks:
  open-arms-network:
    driver: bridge